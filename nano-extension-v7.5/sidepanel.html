<!DOCTYPE html>
<html><head>
  <style>
    body { font-family: sans-serif; padding: 10px; }
    textarea { width: 100%; height: 60px; margin-bottom: 10px; font-family: monospace; border: 1px solid #ccc; border-radius: 4px; padding: 5px; }
    button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; margin-bottom: 5px; }
    button:hover { background: #0056b3; }
    button.stop { background: #dc3545; }
    #log { margin-top: 10px; padding: 10px; background: #f8f9fa; height: 350px; overflow-y: auto; border: 1px solid #ddd; font-size: 11px; font-family: monospace; white-space: pre-wrap; border-radius: 4px; }
    .ai { color: #008000; font-weight: bold; }
    .error { color: #d32f2f; font-weight: bold; }
    .debug { color: #666; font-size: 10px; }
    .result-card { background: #fff; border: 1px solid #ddd; padding: 5px; margin-top: 5px; border-radius: 4px; border-left: 3px solid #28a745; }
  </style>
</head><body>
  <h3>🧬 Nano Agent v7.5</h3>
  <textarea id="prompt">e.g. compare iphone 17 prices on amazon and flipkart</textarea>
  <label style="font-size:12px;"><input type="checkbox" id="show-boxes" checked> Show Outlines</label>
  <button id="run">ASK GEMINI & RUN</button>
  <button id="stop" class="stop" style="display:none;">STOP AGENT</button>
  <div id="log"></div>
  <script src="sidepanel.js"></script>
</body></html>
